<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitpe</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#7c3aed', dark: '#5b21b6', accent: '#facc15' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-display {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- TELA DE LOGIN (limpa, sem chamar atenção) -->
    <div id="tela-login" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm border border-gray-200">
            <div class="text-center mb-8">
                <img src="logo.png" alt="Bitpe" class="h-10 mx-auto mb-6">
            </div>

            <div class="space-y-4">
                <div>
                    <div class="relative">
                        <input type="password" id="admin-senha" placeholder="Senha"
                            class="w-full border-2 border-gray-200 rounded-lg py-3 px-4 pr-12 focus:outline-none focus:border-brand transition-colors text-base"
                            onkeydown="if(event.key==='Enter') loginAdmin()">
                        <i class="fas fa-lock absolute right-4 top-4 text-gray-300 text-sm"></i>
                    </div>
                </div>

                <button onclick="loginAdmin()"
                    class="w-full bg-brand text-white font-bold h-12 rounded-lg tracking-wider hover:bg-brand-dark transition-colors shadow-lg flex items-center justify-center text-sm">
                    Entrar
                </button>

                <p id="login-erro" class="text-red-500 text-xs font-bold text-center hidden">
                    <i class="fas fa-exclamation-circle mr-1"></i> Credenciais inválidas.
                </p>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <a href="index.html" class="text-gray-400 text-xs hover:text-brand transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i> bitpecalcados.com
                </a>
            </div>
        </div>
    </div>

    <!-- PAINEL (Aparece após login) -->
    <div id="painel-admin" class="hidden">
        <div class="flex min-h-screen">

            <!-- BARRA LATERAL -->
            <aside class="w-60 bg-gray-900 text-white flex-shrink-0 flex flex-col fixed h-full z-40">
                <div class="p-5 border-b border-gray-800">
                    <img src="logo.png" alt="Bitpe" class="h-7 brightness-0 invert opacity-80">
                </div>

                <nav class="flex-grow py-4">
                    <button onclick="navegarAdmin('dashboard')"
                        class="admin-nav-btn w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-gray-800 transition-colors text-sm font-medium text-gray-400 hover:text-white"
                        data-tab="dashboard">
                        <i class="fas fa-chart-pie w-5 text-center text-sm"></i> Visão Geral
                    </button>
                    <button onclick="navegarAdmin('pedidos')"
                        class="admin-nav-btn w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-gray-800 transition-colors text-sm font-medium text-gray-400 hover:text-white"
                        data-tab="pedidos">
                        <i class="fas fa-box w-5 text-center text-sm"></i> Pedidos
                    </button>
                    <button onclick="navegarAdmin('produtos')"
                        class="admin-nav-btn w-full text-left px-5 py-3 flex items-center gap-3 hover:bg-gray-800 transition-colors text-sm font-medium text-gray-400 hover:text-white"
                        data-tab="produtos">
                        <i class="fas fa-tags w-5 text-center text-sm"></i> Produtos
                    </button>
                </nav>

                <div class="p-4 border-t border-gray-800">
                    <button onclick="logoutAdmin()"
                        class="w-full text-left px-2 py-2 flex items-center gap-3 text-gray-500 hover:text-red-400 text-xs font-medium transition-colors">
                        <i class="fas fa-sign-out-alt w-5 text-center"></i> Encerrar sessão
                    </button>
                </div>
            </aside>

            <!-- CONTEÚDO PRINCIPAL -->
            <main class="flex-grow ml-60">

                <!-- HEADER -->
                <header
                    class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between sticky top-0 z-30">
                    <div>
                        <h1 id="admin-titulo-pagina" class="font-display text-lg font-bold text-gray-900">Visão Geral
                        </h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-xs text-gray-400" id="admin-data-hora"></span>
                    </div>
                </header>

                <!-- ÁREA DE CONTEÚDO -->
                <div class="p-8" id="admin-conteudo">

                    <!-- DASHBOARD -->
                    <div id="tab-dashboard">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-8">
                            <div
                                class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow">
                                <div class="flex items-center justify-between mb-3">
                                    <span
                                        class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Hoje</span>
                                    <div class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-shopping-cart text-blue-400 text-xs"></i>
                                    </div>
                                </div>
                                <p class="text-2xl font-bold text-gray-900" id="dash-pedidos-hoje">0</p>
                                <p class="text-[10px] text-gray-400 mt-1">pedidos</p>
                            </div>
                            <div
                                class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow">
                                <div class="flex items-center justify-between mb-3">
                                    <span
                                        class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Faturamento</span>
                                    <div class="w-8 h-8 bg-green-50 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-dollar-sign text-green-400 text-xs"></i>
                                    </div>
                                </div>
                                <p class="text-2xl font-bold text-gray-900" id="dash-faturamento">R$ 0</p>
                                <p class="text-[10px] text-gray-400 mt-1">total aprovado</p>
                            </div>
                            <div
                                class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">A
                                        Despachar</span>
                                    <div class="w-8 h-8 bg-orange-50 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-truck text-orange-400 text-xs"></i>
                                    </div>
                                </div>
                                <p class="text-2xl font-bold text-gray-900" id="dash-despachar">0</p>
                                <p class="text-[10px] text-gray-400 mt-1">aguardando envio</p>
                            </div>
                            <div
                                class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-shadow">
                                <div class="flex items-center justify-between mb-3">
                                    <span
                                        class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Produtos</span>
                                    <div class="w-8 h-8 bg-purple-50 rounded-lg flex items-center justify-center">
                                        <i class="fas fa-tags text-purple-400 text-xs"></i>
                                    </div>
                                </div>
                                <p class="text-2xl font-bold text-gray-900" id="dash-total-produtos">0</p>
                                <p class="text-[10px] text-gray-400 mt-1">no catálogo</p>
                            </div>
                        </div>

                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="font-bold text-sm text-gray-700">Últimos Pedidos</h3>
                                <button onclick="navegarAdmin('pedidos')"
                                    class="text-brand text-xs font-bold hover:underline">Ver todos →</button>
                            </div>
                            <div id="dash-ultimos-pedidos" class="text-gray-400 text-sm">
                                <div class="text-center py-12">
                                    <i class="fas fa-inbox text-3xl text-gray-200 mb-3"></i>
                                    <p class="text-gray-400 text-sm">Nenhum pedido ainda</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PEDIDOS -->
                    <div id="tab-pedidos" class="hidden">
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                                <h3 class="font-bold text-sm text-gray-700">Todos os Pedidos</h3>
                                <button onclick="carregarPedidos()"
                                    class="bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-sync-alt mr-2"></i> Atualizar
                                </button>
                            </div>
                            <div id="tabela-pedidos" class="p-6">
                                <div class="text-center py-12">
                                    <i class="fas fa-inbox text-3xl text-gray-200 mb-3"></i>
                                    <p class="text-gray-400 text-sm">Nenhum pedido registrado</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PRODUTOS -->
                    <div id="tab-produtos" class="hidden">
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                                <h3 class="font-bold text-sm text-gray-700">Catálogo</h3>
                                <div class="flex gap-2">
                                    <button onclick="carregarProdutosAdmin()"
                                        class="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-gray-200 transition-colors">
                                        <i class="fas fa-sync-alt mr-1"></i> Atualizar
                                    </button>
                                </div>
                            </div>
                            <div id="tabela-produtos" class="p-6">
                                <p class="text-gray-400 text-sm text-center py-8">Carregando...</p>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script>
        // =============================================
        // CONFIGURAÇÃO DO SUPABASE (direto no front do admin)
        // =============================================
        const SUPABASE_URL = 'https://ebtoekllhsroqorylull.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidG9la2xsaHNyb3FvcnlsdWxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDA0MTMsImV4cCI6MjA4ODIxNjQxM30.nabg3Cnomu0xcfL3nJe-QwnWUPPpx2EbhacUlttB_Ak';

        // Helper para chamadas ao Supabase REST API
        async function supaFetch(tabela, query = '') {
            const resp = await fetch(`${SUPABASE_URL}/rest/v1/${tabela}${query}`, {
                headers: {
                    'apikey': SUPABASE_ANON,
                    'Authorization': 'Bearer ' + SUPABASE_ANON
                }
            });
            return resp.json();
        }

        // =============================================
        // LOGIN
        // =============================================
        let _adminToken = '';

        function loginAdmin() {
            const senha = document.getElementById('admin-senha').value.trim();
            if (!senha) return;

            _adminToken = senha;

            fetch('/api/admin/pedidos', {
                headers: { 'Authorization': 'Bearer ' + _adminToken }
            })
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('login-erro').classList.remove('hidden');
                        _adminToken = '';
                        return;
                    }
                    // Login OK
                    document.getElementById('tela-login').classList.add('hidden');
                    document.getElementById('painel-admin').classList.remove('hidden');
                    document.getElementById('login-erro').classList.add('hidden');
                    navegarAdmin('dashboard');
                    carregarDashboard(data.pedidos || []);
                    atualizarRelogio();
                    setInterval(atualizarRelogio, 60000);
                })
                .catch(() => {
                    document.getElementById('login-erro').classList.remove('hidden');
                    _adminToken = '';
                });
        }

        function logoutAdmin() {
            _adminToken = '';
            document.getElementById('painel-admin').classList.add('hidden');
            document.getElementById('tela-login').classList.remove('hidden');
            document.getElementById('admin-senha').value = '';
        }

        // =============================================
        // DASHBOARD — carrega métricas reais
        // =============================================
        async function carregarDashboard(pedidos) {
            // Pedidos de hoje
            const hoje = new Date().toISOString().split('T')[0];
            const pedidosHoje = pedidos.filter(p => p.created_at && p.created_at.startsWith(hoje));
            document.getElementById('dash-pedidos-hoje').textContent = pedidosHoje.length;

            // Faturamento (pedidos com status pago, preparando, enviado ou entregue)
            const statusPagos = ['pago', 'preparando', 'enviado', 'entregue'];
            const faturamento = pedidos
                .filter(p => statusPagos.includes(p.status))
                .reduce((acc, p) => acc + (parseFloat(p.total) || 0), 0);
            document.getElementById('dash-faturamento').textContent = `R$ ${faturamento.toFixed(2).replace('.', ',')}`;

            // A despachar (pagos mas não enviados)
            const aDespachar = pedidos.filter(p => p.status === 'pago' || p.status === 'preparando').length;
            document.getElementById('dash-despachar').textContent = aDespachar;

            // Total de produtos
            try {
                const produtos = await supaFetch('produtos', '?select=id&ativo=eq.true');
                document.getElementById('dash-total-produtos').textContent = Array.isArray(produtos) ? produtos.length : 0;
            } catch (e) {
                document.getElementById('dash-total-produtos').textContent = '—';
            }

            // Últimos pedidos na dashboard
            const container = document.getElementById('dash-ultimos-pedidos');
            if (pedidos.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-inbox text-3xl text-gray-200 mb-3"></i>
                        <p class="text-gray-400 text-sm">Nenhum pedido ainda</p>
                    </div>`;
                return;
            }

            const statusCores = {
                pendente: 'bg-yellow-100 text-yellow-700',
                pago: 'bg-green-100 text-green-700',
                preparando: 'bg-blue-100 text-blue-700',
                enviado: 'bg-purple-100 text-purple-700',
                entregue: 'bg-gray-100 text-gray-600',
                cancelado: 'bg-red-100 text-red-700'
            };

            let html = '<div class="divide-y divide-gray-50">';
            pedidos.slice(0, 5).forEach(p => {
                const cor = statusCores[p.status] || 'bg-gray-100 text-gray-500';
                const data = new Date(p.created_at).toLocaleDateString('pt-BR');
                html += `
                    <div class="flex items-center justify-between py-3">
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-bold text-brand">#${p.id}</span>
                            <span class="text-sm text-gray-700">${p.cliente_nome || 'Cliente'}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-sm font-bold text-gray-900">R$ ${(p.total || 0).toFixed(2).replace('.', ',')}</span>
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${cor}">${p.status}</span>
                        </div>
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // =============================================
        // NAVEGAÇÃO
        // =============================================
        function navegarAdmin(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
            const tabEl = document.getElementById('tab-' + tab);
            if (tabEl) tabEl.classList.remove('hidden');

            document.querySelectorAll('.admin-nav-btn').forEach(btn => {
                btn.classList.remove('bg-gray-800', 'text-white', 'border-l-4', 'border-brand');
                btn.classList.add('text-gray-400');
            });
            const btnAtivo = document.querySelector(`[data-tab="${tab}"]`);
            if (btnAtivo) {
                btnAtivo.classList.add('bg-gray-800', 'text-white', 'border-l-4', 'border-brand');
                btnAtivo.classList.remove('text-gray-400');
            }

            const titulos = { dashboard: 'Visão Geral', pedidos: 'Pedidos', produtos: 'Produtos' };
            document.getElementById('admin-titulo-pagina').textContent = titulos[tab] || '';

            // Auto-carrega dados ao navegar
            if (tab === 'pedidos') carregarPedidos();
            if (tab === 'produtos') carregarProdutosAdmin();
        }

        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('admin-data-hora').textContent = agora.toLocaleString('pt-BR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        // =============================================
        // PEDIDOS
        // =============================================
        async function carregarPedidos() {
            const container = document.getElementById('tabela-pedidos');
            container.innerHTML = '<p class="text-center py-4 text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>Carregando...</p>';

            try {
                const resp = await fetch('/api/admin/pedidos', {
                    headers: { 'Authorization': 'Bearer ' + _adminToken }
                });
                const data = await resp.json();

                if (data.error) {
                    container.innerHTML = `<p class="text-red-500 text-center py-4">${data.error}</p>`;
                    return;
                }

                if (!data.pedidos || data.pedidos.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12">
                            <i class="fas fa-inbox text-3xl text-gray-200 mb-3"></i>
                            <p class="text-gray-400 text-sm">Nenhum pedido registrado</p>
                        </div>`;
                    return;
                }

                const statusCores = {
                    pendente: 'bg-yellow-100 text-yellow-700',
                    pago: 'bg-green-100 text-green-700',
                    preparando: 'bg-blue-100 text-blue-700',
                    enviado: 'bg-purple-100 text-purple-700',
                    entregue: 'bg-gray-100 text-gray-600',
                    cancelado: 'bg-red-100 text-red-700'
                };

                let html = `
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="border-b border-gray-200 text-left text-[10px] font-bold text-gray-400 uppercase tracking-wider">
                                    <th class="py-3 px-4">#</th>
                                    <th class="py-3 px-4">Cliente</th>
                                    <th class="py-3 px-4">Cidade</th>
                                    <th class="py-3 px-4">Total</th>
                                    <th class="py-3 px-4">Status</th>
                                    <th class="py-3 px-4">Data</th>
                                    <th class="py-3 px-4">Ações</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
                `;

                data.pedidos.forEach(p => {
                    const cor = statusCores[p.status] || 'bg-gray-100 text-gray-500';
                    const dt = new Date(p.created_at).toLocaleDateString('pt-BR');
                    html += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-3 px-4 font-bold text-brand text-xs">${p.id}</td>
                            <td class="py-3 px-4 text-gray-700">${p.cliente_nome || '—'}</td>
                            <td class="py-3 px-4 text-gray-400 text-xs">${p.endereco_cidade || '—'}/${p.endereco_estado || ''}</td>
                            <td class="py-3 px-4 font-bold">R$ ${(p.total || 0).toFixed(2).replace('.', ',')}</td>
                            <td class="py-3 px-4"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${cor}">${p.status}</span></td>
                            <td class="py-3 px-4 text-gray-400 text-xs">${dt}</td>
                            <td class="py-3 px-4">
                                <select onchange="atualizarStatusPedido(${p.id}, this.value)" class="text-xs border border-gray-200 rounded px-2 py-1 focus:outline-none focus:border-brand">
                                    <option value="">Alterar...</option>
                                    <option value="pago">✅ Pago</option>
                                    <option value="preparando">📦 Preparando</option>
                                    <option value="enviado">🚚 Enviado</option>
                                    <option value="entregue">✔️ Entregue</option>
                                    <option value="cancelado">❌ Cancelado</option>
                                </select>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table></div>';
                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-center py-4">Erro: ${err.message}</p>`;
            }
        }

        async function atualizarStatusPedido(pedidoId, novoStatus) {
            if (!novoStatus) return;

            try {
                const resp = await fetch('/api/admin/pedidos', {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer ' + _adminToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pedido_id: pedidoId, status: novoStatus })
                });
                const data = await resp.json();

                if (data.sucesso) {
                    carregarPedidos(); // Recarrega a tabela
                } else {
                    alert('Erro: ' + (data.error || 'Falha ao atualizar'));
                }
            } catch (err) {
                alert('Erro de conexão: ' + err.message);
            }
        }

        // =============================================
        // PRODUTOS (lê direto do Supabase via anon key)
        // =============================================
        async function carregarProdutosAdmin() {
            const container = document.getElementById('tabela-produtos');
            container.innerHTML = '<p class="text-center py-4 text-gray-400"><i class="fas fa-spinner fa-spin mr-2"></i>Carregando...</p>';

            try {
                const produtos = await supaFetch('produtos', '?select=*&order=id.asc');

                if (!Array.isArray(produtos) || produtos.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-sm text-center py-8">Nenhum produto cadastrado.</p>';
                    return;
                }

                let html = `
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="border-b border-gray-200 text-left text-[10px] font-bold text-gray-400 uppercase tracking-wider">
                                    <th class="py-3 px-4">ID</th>
                                    <th class="py-3 px-4">Produto</th>
                                    <th class="py-3 px-4">Categoria</th>
                                    <th class="py-3 px-4">Preço</th>
                                    <th class="py-3 px-4">Estoque</th>
                                    <th class="py-3 px-4">Ativo</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-50">
                `;

                produtos.forEach(p => {
                    const statusEstoque = p.esgotado
                        ? '<span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-red-100 text-red-600">Esgotado</span>'
                        : '<span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-green-100 text-green-600">Disponível</span>';
                    const statusAtivo = p.ativo
                        ? '<span class="text-green-500"><i class="fas fa-check-circle"></i></span>'
                        : '<span class="text-gray-300"><i class="fas fa-minus-circle"></i></span>';

                    html += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-3 px-4 font-bold text-brand text-xs">${p.id}</td>
                            <td class="py-3 px-4">
                                <div class="flex items-center gap-3">
                                    <img src="${p.imagem_principal}" class="w-10 h-10 object-cover rounded bg-gray-50 mix-blend-multiply" onerror="this.src='https://placehold.co/40x40/eee/999?text=?'">
                                    <span class="font-bold text-gray-800 text-sm">${p.nome}</span>
                                </div>
                            </td>
                            <td class="py-3 px-4 text-gray-400 text-xs">${p.categoria}</td>
                            <td class="py-3 px-4 font-bold">R$ ${(p.preco_atual || 0).toFixed(2).replace('.', ',')}</td>
                            <td class="py-3 px-4">${statusEstoque}</td>
                            <td class="py-3 px-4">${statusAtivo}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table></div>';
                container.innerHTML = html;

            } catch (err) {
                container.innerHTML = `<p class="text-red-500 text-center py-4">Erro: ${err.message}</p>`;
            }
        }
    </script>

</body>

</html>
